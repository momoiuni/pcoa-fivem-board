<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM 作戦ボード</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

#left{
width:220px;
background:#1a1a1a;
padding:10px;
overflow:auto;
}

.player{
background:#2b2b2b;
padding:7px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
}

#board{
flex:1;
position:relative;
overflow:hidden;
touch-action:none;
cursor:grab;
}

#map{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
transform-origin:center;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:2;
}

.icon{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
cursor:grab;
z-index:3;
transform-origin:top left;
}

.police{background:#3498db;}
.gang{background:#e74c3c;}
.merc{background:#9b59b6;}

#top{
position:absolute;
top:10px;
left:240px;
z-index:4;
}

button{
margin:2px;
padding:6px;
}

</style>
</head>

<body>

<div id="left">

<h3>警察</h3>
<div class="player" onclick="spawn('警','police')">警察</div>

<h3>ギャング</h3>
<div class="player" onclick="spawn('七','gang')">七海のあ</div>
<div class="player" onclick="spawn('禿','gang')">蒼瀬こあ</div>
<div class="player" onclick="spawn('狼','gang')">白影潤羽</div>
<div class="player" onclick="spawn('獅','gang')">獅子蓮夢生</div>
<div class="player" onclick="spawn('犬','gang')">只野なち</div>
<div class="player" onclick="spawn('兎','gang')">兎月羅依</div>
<div class="player" onclick="spawn('嬢','gang')">雛子丸びこち</div>
<div class="player" onclick="spawn('牛','gang')">奇美羅ぬい仔</div>
<div class="player" onclick="spawn('猫','gang')">猫宮すい</div>
<div class="player" onclick="spawn('ゼ','gang')">古賀ゼン</div>
<div class="player" onclick="spawn('華','gang')">風槻華音</div>
<div class="player" onclick="spawn('雷','gang')">雷導新羅</div>

<h3>傭兵</h3>
<div class="player" onclick="spawn('澪','merc')">神楽澪</div>
<div class="player" onclick="spawn('弟','merc')">桃井そら</div>
  
</div>

<div id="board">

<img id="map" src="bobcat.jpg">

<canvas id="draw"></canvas>

<div id="top">

<select id="mapSelect">
<option value="bobcat.jpg">ボブキャット</option>
<option value="union.jpg">ユニオン</option>
<option value="military.jpg">軍事基地</option>
<option value="airport.jpg">飛行場</option>
<option value="humane.jpg">ヒューメイン</option>
<option value="pacific.jpg">パシフィック</option>
</select>

<br>

<button onclick="mode='line'">線</button>
<button onclick="mode='arrow'">矢印</button>
<button onclick="undo()">戻る</button>
<button onclick="clearDraw()">削除</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
import { getFirestore,doc,setDoc,onSnapshot,getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyBmvXnvy1ttB8QllcCcm6eW2ZV7Qg-ZFW4",
authDomain:"pcoa-plan.firebaseapp.com",
projectId:"pcoa-plan",
storageBucket:"pcoa-plan.firebasestorage.app",
messagingSenderId:"121585105198",
appId:"1:121585105198:web:4fe893ae9be81ba23822bf"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

/* ユーザー色 */

const userColor="#"+Math.floor(Math.random()*16777215).toString(16)
  
const params=new URLSearchParams(location.search)

const room=params.get("room") || "main"

const iconRef=doc(db,"boards",room+"_icons")
const lineRef=doc(db,"boards",room+"_lines")

const board=document.getElementById("board")

/* アイコン生成 */

window.spawn=function(char,type){

let icon=document.createElement("div")

icon.className="icon "+type
icon.innerText=char
icon.style.left="200px"
icon.style.top="200px"

board.appendChild(icon)

drag(icon)

saveIcons()

}

/* 右クリック削除 */

function enableDelete(icon){

icon.addEventListener("contextmenu",e=>{
e.preventDefault()
icon.remove()
saveIcons()
})

}

/* ドラッグ */

function drag(el){

enableDelete(el)

let offsetX,offsetY

el.onmousedown=start
el.ontouchstart=start

function start(e){

let touch=e.touches?e.touches[0]:e

offsetX=touch.clientX-el.offsetLeft
offsetY=touch.clientY-el.offsetTop

document.onmousemove=move
document.ontouchmove=move

}

function move(e){

let touch=e.touches?e.touches[0]:e

el.style.left=touch.clientX-offsetX+"px"
el.style.top=touch.clientY-offsetY+"px"

}

document.onmouseup=end
document.ontouchend=end

function end(){

document.onmousemove=null
document.ontouchmove=null

saveIcons()

}

}

/* 保存 */

async function saveIcons(){

let icons=[]

document.querySelectorAll(".icon").forEach(i=>{

icons.push({
text:i.innerText,
class:i.className,
x:i.style.left,
y:i.style.top
})

})

setDoc(iconRef,{icons})

}

/* 受信 */

onSnapshot(iconRef,(snap)=>{

if(!snap.exists())return

document.querySelectorAll(".icon").forEach(i=>i.remove())

snap.data().icons.forEach(data=>{

let icon=document.createElement("div")

icon.className=data.class
icon.innerText=data.text
icon.style.left=data.x
icon.style.top=data.y

board.appendChild(icon)

drag(icon)

})

})

/* canvas */

const canvas=document.getElementById("draw")
const ctx=canvas.getContext("2d")

function resize(){

canvas.width=board.clientWidth
canvas.height=board.clientHeight

}

window.onresize=resize
resize()

let drawing=false
let startX,startY
let mode="line"

canvas.onmousedown=e=>{

drawing=true
startX=e.offsetX
startY=e.offsetY

}

canvas.onmouseup=e=>{

if(!drawing)return
drawing=false

let line={
x1:startX,
y1:startY,
x2:e.offsetX,
y2:e.offsetY,
mode:mode
}

saveLine(line)

}

async function saveLine(line){

let data={lines:[]}

const snap=await getDoc(lineRef)

if(snap.exists())data=snap.data()

data.lines.push(line)

setDoc(lineRef,data)

}

onSnapshot(lineRef,(snap)=>{

if(!snap.exists())return

ctx.clearRect(0,0,canvas.width,canvas.height)

snap.data().lines.forEach(l=>{

ctx.beginPath()
ctx.moveTo(l.x1,l.y1)
ctx.lineTo(l.x2,l.y2)
ctx.strokeStyle="red"
ctx.lineWidth=4
ctx.stroke()

if(l.mode==="arrow"){

let angle=Math.atan2(l.y2-l.y1,l.x2-l.x1)

ctx.beginPath()
ctx.moveTo(l.x2,l.y2)
ctx.lineTo(l.x2-15*Math.cos(angle-0.5),l.y2-15*Math.sin(angle-0.5))
ctx.lineTo(l.x2-15*Math.cos(angle+0.5),l.y2-15*Math.sin(angle+0.5))
ctx.fillStyle="red"
ctx.fill()

}

})

})

/* 全体ズーム */

let scale = 1


/* PCズーム */

board.addEventListener("wheel",e=>{

e.preventDefault()

scale += e.deltaY * -0.001
scale = Math.min(Math.max(.5,scale),3)

})

/* スマホピンチズーム */

let startDist = 0

board.addEventListener("touchstart",e=>{

if(e.touches.length == 2){

startDist = Math.hypot(
e.touches[0].clientX - e.touches[1].clientX,
e.touches[0].clientY - e.touches[1].clientY
)

}

})

board.addEventListener("touchmove",e=>{

if(e.touches.length == 2){

let newDist = Math.hypot(
e.touches[0].clientX - e.touches[1].clientX,
e.touches[0].clientY - e.touches[1].clientY
)

scale *= newDist / startDist
scale = Math.min(Math.max(.5,scale),3)

startDist = newDist

}

})

  /* 線削除 */

window.clearDraw = async function(){

ctx.clearRect(0,0,canvas.width,canvas.height)

await setDoc(lineRef,{lines:[]})

}

/* Undo */

window.undo = async function(){

const snap = await getDoc(lineRef)

if(!snap.exists()) return

let data = snap.data()

if(!data.lines) return

data.lines.pop()

await setDoc(lineRef,data)

}
  /* マップ切替 */

document.getElementById("mapSelect").addEventListener("change",e=>{

document.getElementById("map").src=e.target.value

})

  /* マップパン */

let panX = 0
let panY = 0
let isPanning = false
let panStartX = 0
let panStartY = 0

function applyTransform(){

document.getElementById("map").style.transform =
`translate(${panX}px,${panY}px) scale(${scale})`

canvas.style.transform =
`translate(${panX}px,${panY}px) scale(${scale})`

}

/* PCドラッグ */

board.addEventListener("mousedown",e=>{

if(e.target.classList.contains("icon")) return

isPanning = true
panStartX = e.clientX - panX
panStartY = e.clientY - panY

})

document.addEventListener("mousemove",e=>{

if(!isPanning) return

panX = e.clientX - panStartX
panY = e.clientY - panStartY

applyTransform()

})

document.addEventListener("mouseup",()=>{

isPanning = false

})

/* スマホドラッグ */

board.addEventListener("touchstart",e=>{

if(e.touches.length==1){

isPanning=true

panX = e.touches[0].clientX - panStartX
panY = e.touches[0].clientY - panStartY

}

})

board.addEventListener("touchmove",e=>{

if(!isPanning) return

panX = e.touches[0].clientX - panStartX
panY = e.touches[0].clientY - panStartY

applyTransform()

})

board.addEventListener("touchend",()=>{

isPanning=false

})

</script>

</body>
</html>
