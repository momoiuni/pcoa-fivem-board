<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCOA FiveM 作戦ボード</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

#left{
width:230px;
background:#1a1a1a;
padding:10px;
overflow:auto;
}

.player{
background:#2b2b2b;
padding:7px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
}

#board{
flex:1;
position:relative;
overflow:hidden;
touch-action:none;
}

#map{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
z-index:1;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:2;
}

.icon{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
cursor:grab;
z-index:3;
}

.police{background:#3498db;}
.gang{background:#e74c3c;}
.merc{background:#9b59b6;}

#top{
position:absolute;
top:10px;
left:250px;
z-index:4;
}

button{
margin:2px;
padding:6px;
}

</style>
</head>

<body>

<div id="left">

<h3>警察</h3>
<div class="player" onclick="spawn('警','police')">警察①</div>

<h3>ギャング</h3>
<div class="player" onclick="spawn('七','gang')">七海のあ</div>
<div class="player" onclick="spawn('禿','gang')">蒼瀬こあ</div>
<div class="player" onclick="spawn('狼','gang')">白影潤羽</div>
<div class="player" onclick="spawn('獅','gang')">獅子蓮夢生</div>
<div class="player" onclick="spawn('犬','gang')">只野なち</div>
<div class="player" onclick="spawn('兎','gang')">兎月羅依</div>
<div class="player" onclick="spawn('嬢','gang')">雛子丸びこち</div>
<div class="player" onclick="spawn('牛','gang')">奇美羅ぬい仔</div>
<div class="player" onclick="spawn('猫','gang')">猫宮すい</div>
<div class="player" onclick="spawn('ゼ','gang')">古賀ゼン</div>
<div class="player" onclick="spawn('華','gang')">風槻華音</div>
<div class="player" onclick="spawn('雷','gang')">雷導新羅</div>

<h3>傭兵</h3>
<div class="player" onclick="spawn('澪','merc')">神楽澪</div>
<div class="player" onclick="spawn('弟','merc')">桃井そら</div>

</div>

<div id="board">

<img id="map" src="bobcat.jpg">

<canvas id="draw"></canvas>

<div id="top">

<select id="mapSelect">
<option value="bobcat.jpg">ボブキャット</option>
<option value="military.jpg">軍事基地</option>
<option value="airport.jpg">飛行場</option>
<option value="ship.jpg">客船</option>
<option value="artifact.jpg">アーティファクト</option>
<option value="union.jpg">ユニオン</option>
<option value="humane.jpg">ヒューメイン</option>
<option value="pacific.jpg">パシフィック</option>
</select>
<br>

<button onclick="mode='line'">線</button>
<button onclick="mode='arrow'">矢印</button>
<button onclick="undo()">戻る</button>
<button onclick="clearDraw()">削除</button>

</div>

</div>

<script>

const board=document.getElementById("board")

function spawn(char,type){

let icon=document.createElement("div")
icon.className="icon "+type
icon.innerText=char
icon.style.left="200px"
icon.style.top="200px"

board.appendChild(icon)
drag(icon)
  
saveState()

}

function drag(el){

let offsetX,offsetY

el.onmousedown=start
el.ontouchstart=start

function start(e){

let touch=e.touches?e.touches[0]:e

offsetX=touch.clientX-el.offsetLeft
offsetY=touch.clientY-el.offsetTop

document.onmousemove=move
document.ontouchmove=move

}

function move(e){

let touch=e.touches?e.touches[0]:e

el.style.left=touch.clientX-offsetX+"px"
el.style.top=touch.clientY-offsetY+"px"

}

document.onmouseup=end
document.ontouchend=end

function end(){

document.onmousemove=null
document.ontouchmove=null

saveState()

}

}

/* ===== CANVAS ===== */

let canvas=document.getElementById("draw")
let ctx=canvas.getContext("2d")

function resize(){

canvas.width=board.clientWidth
canvas.height=board.clientHeight

}

window.onresize=resize
resize()

let drawing=false
let startX,startY
let mode="line"
let history=[]

canvas.onmousedown=e=>{

drawing=true
startX=e.offsetX
startY=e.offsetY

}

canvas.onmouseup=e=>{

if(!drawing) return
drawing=false

history.push(ctx.getImageData(0,0,canvas.width,canvas.height))

ctx.strokeStyle="red"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(startX,startY)
ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

if(mode==="arrow"){

let angle=Math.atan2(e.offsetY-startY,e.offsetX-startX)

ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)
ctx.lineTo(e.offsetX-15*Math.cos(angle-0.5),e.offsetY-15*Math.sin(angle-0.5))
ctx.lineTo(e.offsetX-15*Math.cos(angle+0.5),e.offsetY-15*Math.sin(angle+0.5))
ctx.closePath()
ctx.fillStyle="red"
ctx.fill()

}

}

function undo(){

if(history.length>0){
ctx.putImageData(history.pop(),0,0)
}

}

function clearDraw(){

ctx.clearRect(0,0,canvas.width,canvas.height)
history=[]

}

document.getElementById("mapSelect").onchange=e=>{
document.getElementById("map").src=e.target.value
}

/* ===== スマホピンチズーム ===== */

let scale=1

board.addEventListener("wheel",e=>{
e.preventDefault()
scale+=e.deltaY*-0.001
scale=Math.min(Math.max(.5,scale),3)
board.style.transform=`scale(${scale})`
})

</script>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBmvXnvy1ttB8QllcCcm6eW2ZV7Qg-ZFW4",
authDomain: "pcoa-plan.firebaseapp.com",
projectId: "pcoa-plan",
storageBucket: "pcoa-plan.firebasestorage.app",
messagingSenderId: "121585105198",
appId: "1:121585105198:web:4fe893ae9be81ba23822bf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const room = doc(db,"boards","main");

function saveState(){

let icons=[]

document.querySelectorAll(".icon").forEach(i=>{

icons.push({
text:i.innerText,
class:i.className,
x:i.style.left,
y:i.style.top
})

})

setDoc(room,{icons})

}

onSnapshot(room,(doc)=>{

if(!doc.exists()) return

document.querySelectorAll(".icon").forEach(i=>i.remove())

doc.data().icons.forEach(data=>{

let icon=document.createElement("div")

icon.className=data.class
icon.innerText=data.text
icon.style.left=data.x
icon.style.top=data.y

document.getElementById("board").appendChild(icon)

drag(icon)

})

})

window.saveState=saveState

</script>
</body>
</html>
