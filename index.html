<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM 作戦ボード v3</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

#left{
width:220px;
background:#1a1a1a;
padding:10px;
overflow:auto;
}

.player{
background:#2b2b2b;
padding:7px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
}

#board{
flex:1;
position:relative;
overflow:hidden;
touch-action:none;
}

#map{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
transform-origin:0 0;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:2;
}

.icon{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
cursor:grab;
z-index:3;
}

.pin{
position:absolute;
font-size:28px;
z-index:4;
pointer-events:none;
}

.police{background:#3498db;}
.gang{background:#e74c3c;}
.merc{background:#9b59b6;}

#top{
position:absolute;
top:10px;
left:240px;
z-index:5;
}

button{
margin:2px;
padding:6px;
}

</style>

</head>

<body>

<div id="left">

<h3>警察</h3>
<div class="player" onclick="spawn('警','police')">警察</div>

<h3>ギャング</h3>
<div class="player" onclick="spawn('七','gang')">七海のあ</div>
<div class="player" onclick="spawn('禿','gang')">蒼瀬こあ</div>
<div class="player" onclick="spawn('狼','gang')">白影潤羽</div>
<div class="player" onclick="spawn('獅','gang')">獅子蓮夢生</div>
<div class="player" onclick="spawn('犬','gang')">只野なち</div>
<div class="player" onclick="spawn('兎','gang')">兎月羅依</div>
<div class="player" onclick="spawn('嬢','gang')">雛子丸びこち</div>
<div class="player" onclick="spawn('牛','gang')">奇美羅ぬい仔</div>
<div class="player" onclick="spawn('猫','gang')">猫宮すい</div>
<div class="player" onclick="spawn('ゼ','gang')">古賀ゼン</div>
<div class="player" onclick="spawn('華','gang')">風槻華音</div>
<div class="player" onclick="spawn('雷','gang')">雷導新羅</div>

<h3>傭兵</h3>
<div class="player" onclick="spawn('澪','merc')">神楽澪</div>
<div class="player" onclick="spawn('弟','merc')">桃井そら</div>

</div>

<div id="board">

<img id="map" src="bobcat.jpg">

<canvas id="draw"></canvas>

<div id="top">

<select id="mapSelect">
<option value="bobcat.jpg">ボブキャット</option>
<option value="union.jpg">ユニオン</option>
<option value="military.jpg">軍事基地</option>
<option value="airport.jpg">飛行場</option>
<option value="humane.jpg">ヒューメイン</option>
<option value="pacific.jpg">パシフィック</option>
</select>

<br>

<button onclick="mode='line'">線</button> <button onclick="mode='arrow'">矢印</button> <button onclick="mode='pin'">ピン</button> <button onclick="undo()">戻る</button> <button onclick="clearDraw()">削除</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
import { getFirestore,doc,setDoc,onSnapshot,getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"

const firebaseConfig={
apiKey:"AIzaSyBmvXnvy1ttB8QllcCcm6eW2ZV7Qg-ZFW4",
authDomain:"pcoa-plan.firebaseapp.com",
projectId:"pcoa-plan",
storageBucket:"pcoa-plan.firebasestorage.app",
messagingSenderId:"121585105198",
appId:"1:121585105198:web:4fe893ae9be81ba23822bf"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const params=new URLSearchParams(location.search)
const room=params.get("room") || "main"

const iconRef=doc(db,"boards",room+"_icons")
const lineRef=doc(db,"boards",room+"_lines")

const board=document.getElementById("board")
const canvas=document.getElementById("draw")
const ctx=canvas.getContext("2d")
const map=document.getElementById("map")

let mode="line"

/* view */

let view={x:0,y:0,scale:1}

/* resize */

function resize(){
canvas.width=board.clientWidth
canvas.height=board.clientHeight
}

resize()
window.onresize=resize

/* world convert */

function screenToWorld(x,y){
return{
x:(x-view.x)/view.scale,
y:(y-view.y)/view.scale
}
}

function worldToScreen(x,y){
return{
x:(x*view.scale)+view.x,
y:(y*view.scale)+view.y
}
}

/* transform */

function applyTransform(){

const t=`translate(${view.x}px,${view.y}px) scale(${view.scale})`

map.style.transform=t
canvas.style.transform=t

updateIcons()
updatePins()

}

/* zoom */

board.addEventListener("wheel",e=>{

e.preventDefault()

const rect=board.getBoundingClientRect()

const mx=e.clientX-rect.left
const my=e.clientY-rect.top

const zoom=e.deltaY<0?1.1:0.9

const newScale=Math.min(Math.max(view.scale*zoom,0.5),3)

const factor=newScale/view.scale

view.x=mx-(mx-view.x)*factor
view.y=my-(my-view.y)*factor

view.scale=newScale

applyTransform()

},{passive:false})

/* pan */

let space=false
let panning=false
let startX,startY

document.addEventListener("keydown",e=>{
if(e.code==="Space") space=true
})

document.addEventListener("keyup",e=>{
if(e.code==="Space") space=false
})

board.addEventListener("mousedown",e=>{

if(space){
panning=true
startX=e.clientX-view.x
startY=e.clientY-view.y
}

})

document.addEventListener("mousemove",e=>{

if(!panning) return

view.x=e.clientX-startX
view.y=e.clientY-startY

applyTransform()

})

document.addEventListener("mouseup",()=>panning=false)

/* lines */

let lines=[]

canvas.addEventListener("mousedown",e=>{

if(mode!=="line"&&mode!=="arrow") return

const w=screenToWorld(e.offsetX,e.offsetY)

startLine=w
drawing=true

})

let drawing=false
let startLine=null

canvas.addEventListener("mouseup",e=>{

if(!drawing) return

drawing=false

const w=screenToWorld(e.offsetX,e.offsetY)

saveLine({
x1:startLine.x,
y1:startLine.y,
x2:w.x,
y2:w.y,
mode:mode
})

})

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

lines.forEach(l=>{

const a=worldToScreen(l.x1,l.y1)
const b=worldToScreen(l.x2,l.y2)

ctx.beginPath()
ctx.moveTo(a.x,a.y)
ctx.lineTo(b.x,b.y)
ctx.strokeStyle="red"
ctx.lineWidth=4
ctx.stroke()

if(l.mode==="arrow"){

let angle=Math.atan2(b.y-a.y,b.x-a.x)

ctx.beginPath()
ctx.moveTo(b.x,b.y)
ctx.lineTo(b.x-15*Math.cos(angle-0.5),b.y-15*Math.sin(angle-0.5))
ctx.lineTo(b.x-15*Math.cos(angle+0.5),b.y-15*Math.sin(angle+0.5))
ctx.fillStyle="red"
ctx.fill()

}

})

}

/* firebase */

async function saveLine(line){

let data={lines:[]}

const snap=await getDoc(lineRef)

if(snap.exists()) data=snap.data()

data.lines.push(line)

setDoc(lineRef,data)

}

onSnapshot(lineRef,snap=>{

if(!snap.exists()) return

lines=snap.data().lines

render()

})

/* icons */

window.spawn=function(char,type){

let icon=document.createElement("div")

icon.className="icon "+type
icon.innerText=char

icon.dataset.x=300
icon.dataset.y=300

board.appendChild(icon)

enableDelete(icon)
drag(icon)

updateIcons()
saveIcons()

}

function updateIcons(){

document.querySelectorAll(".icon").forEach(i=>{

const w={
x:parseFloat(i.dataset.x),
y:parseFloat(i.dataset.y)
}

const s=worldToScreen(w.x,w.y)

i.style.left=s.x+"px"
i.style.top=s.y+"px"

})

}

function drag(icon){

let offsetX,offsetY

icon.onmousedown=e=>{

offsetX=e.offsetX
offsetY=e.offsetY

document.onmousemove=ev=>{

const w=screenToWorld(ev.clientX-offsetX,ev.clientY-offsetY)

icon.dataset.x=w.x
icon.dataset.y=w.y

updateIcons()

}

document.onmouseup=()=>{

document.onmousemove=null
saveIcons()

}

}

}

function enableDelete(icon){

icon.addEventListener("contextmenu",e=>{
e.preventDefault()
icon.remove()
saveIcons()
})

}

async function saveIcons(){

let icons=[]

document.querySelectorAll(".icon").forEach(i=>{

icons.push({
text:i.innerText,
class:i.className,
x:i.dataset.x,
y:i.dataset.y
})

})

setDoc(iconRef,{icons})

}

onSnapshot(iconRef,snap=>{

if(!snap.exists()) return

document.querySelectorAll(".icon").forEach(i=>i.remove())

snap.data().icons.forEach(d=>{

let icon=document.createElement("div")

icon.className=d.class
icon.innerText=d.text

icon.dataset.x=d.x
icon.dataset.y=d.y

board.appendChild(icon)

enableDelete(icon)
drag(icon)

})

updateIcons()

})

/* pins */

let pins=[]

board.addEventListener("click",e=>{

if(mode!=="pin") return

const rect=board.getBoundingClientRect()

const w=screenToWorld(
e.clientX-rect.left,
e.clientY-rect.top
)

pins.push(w)

updatePins()

})

function updatePins(){

document.querySelectorAll(".pin").forEach(p=>p.remove())

pins.forEach(p=>{

const s=worldToScreen(p.x,p.y)

const el=document.createElement("div")

el.className="pin"
el.innerText="📍"

el.style.left=s.x+"px"
el.style.top=s.y+"px"

board.appendChild(el)

})

}

/* clear */

window.clearDraw=async()=>{
await setDoc(lineRef,{lines:[]})
}

/* undo */

window.undo=async()=>{

const snap=await getDoc(lineRef)

if(!snap.exists()) return

let data=snap.data()

data.lines.pop()

await setDoc(lineRef,data)

}

/* map change */

document.getElementById("mapSelect").addEventListener("change",e=>{
map.src=e.target.value
})

</script>

</body>
</html>
