<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PCOA FiveM 作戦ボード</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

#left{
width:230px;
background:#1a1a1a;
padding:10px;
overflow:auto;
}

.player{
background:#2b2b2b;
padding:7px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
}

#board{
flex:1;
position:relative;
overflow:hidden;
touch-action:none;
}

#mapWrapper{
position:absolute;
top:0;
left:0;
transform-origin:0 0;
}

#map{
width:100%;
height:100%;
object-fit:contain;
pointer-events:none;
}

.icon{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
cursor:grab;
}

.police{background:#3498db;}
.gang{background:#e74c3c;}
.merc{background:#9b59b6;}

#top{
position:absolute;
top:10px;
left:250px;
z-index:10;
}

button{
margin:2px;
padding:6px;
}

canvas{
position:absolute;
top:0;
left:0;
}

@media (max-width:800px){

body{
flex-direction:column;
}

#left{
width:100%;
height:200px;
display:flex;
flex-wrap:wrap;
}

.player{
font-size:12px;
padding:5px;
}

#top{
left:10px;
}

}

</style>

</head>

<body>

<div id="left">

<h3>警察</h3>
<div class="player" onclick="spawn('警','police')">警察①</div>

<h3>ギャング</h3>
<div class="player" onclick="spawn('七','gang')">七海のあ</div>
<div class="player" onclick="spawn('禿','gang')">蒼瀬こあ</div>
<div class="player" onclick="spawn('狼','gang')">白影潤羽</div>
<div class="player" onclick="spawn('獅','gang')">獅子蓮夢生</div>
<div class="player" onclick="spawn('犬','gang')">只野なち</div>
<div class="player" onclick="spawn('兎','gang')">兎月羅依</div>
<div class="player" onclick="spawn('嬢','gang')">雛子丸びこち</div>
<div class="player" onclick="spawn('牛','gang')">奇美羅ぬい仔</div>
<div class="player" onclick="spawn('猫','gang')">猫宮すい</div>
<div class="player" onclick="spawn('ゼ','gang')">古賀ゼン</div>
<div class="player" onclick="spawn('華','gang')">風槻華音</div>
<div class="player" onclick="spawn('雷','gang')">雷導新羅</div>

<h3>傭兵</h3>
<div class="player" onclick="spawn('澪','merc')">神楽澪</div>
<div class="player" onclick="spawn('弟','merc')">桃井そら</div>

</div>

<div id="board">

<div id="mapWrapper">

<img id="map" src="bobcat.jpg">

<canvas id="draw"></canvas>

</div>

<div id="top">

<select id="mapSelect">
<option value="bobcat.jpg">ボブキャット</option>
<option value="military.jpg">軍事基地</option>
<option value="airport.jpg">飛行場</option>
<option value="ship.jpg">客船</option>
<option value="artifact.jpg">アーティファクト</option>
<option value="union.jpg">ユニオン</option>
<option value="humane.jpg">ヒューメイン</option>
<option value="pacific.jpg">パシフィック</option>
</select>
<br>

<button onclick="mode='line'">線</button>
<button onclick="mode='arrow'">矢印</button>
<button onclick="undo()">戻る</button>
<button onclick="clearDraw()">削除</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {

PASTE_FIREBASE_CONFIG_HERE

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const board=document.getElementById("board")
const mapWrapper=document.getElementById("mapWrapper")

/* ZOOM */

let scale=1
let posX=0
let posY=0

function updateTransform(){
mapWrapper.style.transform=`translate(${posX}px,${posY}px) scale(${scale})`
}

board.onwheel=e=>{
e.preventDefault()
scale*=e.deltaY>0?0.9:1.1
scale=Math.min(Math.max(0.5,scale),3)
updateTransform()
}

/* MAP DRAG */

let dragMap=false
let startX,startY

board.onmousedown=e=>{

if(e.target.classList.contains("icon")) return

dragMap=true
startX=e.clientX-posX
startY=e.clientY-posY

}

board.onmousemove=e=>{

if(!dragMap) return

posX=e.clientX-startX
posY=e.clientY-startY

updateTransform()

}

board.onmouseup=()=>dragMap=false

/* REALTIME ICONS */

onSnapshot(collection(db,"icons"),snapshot=>{

snapshot.docChanges().forEach(change=>{

let data=change.doc.data()
let el=document.getElementById(change.doc.id)

if(change.type==="added"){

let icon=document.createElement("div")
icon.className="icon "+data.type
icon.innerText=data.char
icon.style.left=data.x+"px"
icon.style.top=data.y+"px"
icon.id=change.doc.id

mapWrapper.appendChild(icon)

drag(icon)

}

if(change.type==="modified"){

el.style.left=data.x+"px"
el.style.top=data.y+"px"

}

})

})

/* SPAWN */

async function spawn(char,type){

await addDoc(collection(db,"icons"),{

char:char,
type:type,
x:200,
y:200

})

}

/* DRAG */

function drag(el){

let offsetX,offsetY

el.onmousedown=e=>{

offsetX=e.clientX-el.offsetLeft
offsetY=e.clientY-el.offsetTop

document.onmousemove=move

}

function move(e){

el.style.left=e.clientX-offsetX+"px"
el.style.top=e.clientY-offsetY+"px"

updateDoc(doc(db,"icons",el.id),{
x:parseInt(el.style.left),
y:parseInt(el.style.top)
})

}

document.onmouseup=()=>document.onmousemove=null

}

/* CANVAS */

let canvas=document.getElementById("draw")
let ctx=canvas.getContext("2d")

function resize(){

canvas.width=board.clientWidth
canvas.height=board.clientHeight

}

window.onresize=resize
resize()

let drawing=false
let startX,startY
let mode="line"
let history=[]

canvas.onmousedown=e=>{

drawing=true
startX=e.offsetX
startY=e.offsetY

}

canvas.onmouseup=e=>{

if(!drawing)return
drawing=false

history.push(ctx.getImageData(0,0,canvas.width,canvas.height))

ctx.strokeStyle="red"
ctx.lineWidth=4

ctx.beginPath()
ctx.moveTo(startX,startY)
ctx.lineTo(e.offsetX,e.offsetY)
ctx.stroke()

if(mode==="arrow"){

let angle=Math.atan2(e.offsetY-startY,e.offsetX-startX)

ctx.beginPath()
ctx.moveTo(e.offsetX,e.offsetY)
ctx.lineTo(e.offsetX-15*Math.cos(angle-0.5),e.offsetY-15*Math.sin(angle-0.5))
ctx.lineTo(e.offsetX-15*Math.cos(angle+0.5),e.offsetY-15*Math.sin(angle+0.5))
ctx.closePath()
ctx.fillStyle="red"
ctx.fill()

}

}

function undo(){

if(history.length>0){

ctx.putImageData(history.pop(),0,0)

}

}

function clearDraw(){

ctx.clearRect(0,0,canvas.width,canvas.height)
history=[]

}

document.getElementById("mapSelect").onchange=e=>{

document.getElementById("map").src=e.target.value

}

</script>

</body>
</html>
