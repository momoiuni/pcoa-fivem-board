<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FiveM Tactical Board v3</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:#111;
color:white;
}

#toolbar{
position:fixed;
top:0;
left:0;
width:100%;
background:#222;
padding:6px;
z-index:1000;
}

button,select{
margin-right:6px;
}

#board{
position:absolute;
top:40px;
left:0;
transform-origin:0 0;
}

#map{
position:absolute;
top:0;
left:0;
user-select:none;
pointer-events:none;
}

#draw{
position:absolute;
top:0;
left:0;
}

.icon{
position:absolute;
font-size:24px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="toolbar">

<select id="mapSelect">
<option value="bobcat.jpg">bobcat</option>
<option value="union.jpg">union</option>
<option value="military.jpg">military</option>
<option value="airport.jpg">airport</option>
<option value="humane.jpg">humane</option>
<option value="pacific.jpg">pacific</option>
<option value="ship.jpg">ship</option>
</select>

<button onclick="mode='draw'">線</button>
<button onclick="mode='arrow'">矢印</button>
<button onclick="spawnPin()">ピン</button>

</div>

<div id="board">

<img id="map" src="bobcat.jpg">

<canvas id="draw"></canvas>

</div>


<script type="module">

/* ---------------------------
Firebase設定
--------------------------- */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"
import { getFirestore,doc,setDoc,onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"

const firebaseConfig = {

apiKey:"AIzaSyBmvXnvy1ttB8QllcCcm6eW2ZV7Qg-ZFW4",
authDomain:"pcoa-plan.firebaseapp.com",
projectId:"coa-plan",

}

const app = initializeApp(firebaseConfig)
const db = getFirestore(app)

const ref = doc(db,"board","data")


/* ---------------------------
Canvas
--------------------------- */

const canvas=document.getElementById("draw")
const ctx=canvas.getContext("2d")

canvas.width=3000
canvas.height=3000


/* ---------------------------
Zoom / Pan
--------------------------- */

const board=document.getElementById("board")

let scale=1
let panX=0
let panY=0

function updateTransform(){

board.style.transform=
`translate(${panX}px,${panY}px) scale(${scale})`

}

/* zoom */

board.addEventListener("wheel",e=>{

e.preventDefault()

const rect=board.getBoundingClientRect()

const mouseX=e.clientX-rect.left
const mouseY=e.clientY-rect.top

const zoom=e.deltaY<0?1.1:0.9

panX -= (mouseX-panX)*(zoom-1)
panY -= (mouseY-panY)*(zoom-1)

scale*=zoom

updateTransform()

})

/* pan */

let space=false
let panning=false
let startX,startY

document.addEventListener("keydown",e=>{
if(e.code==="Space")space=true
})

document.addEventListener("keyup",e=>{
if(e.code==="Space")space=false
})

board.addEventListener("mousedown",e=>{

if(!space)return

panning=true

startX=e.clientX-panX
startY=e.clientY-panY

})

document.addEventListener("mousemove",e=>{

if(!panning)return

panX=e.clientX-startX
panY=e.clientY-startY

updateTransform()

})

document.addEventListener("mouseup",()=>{

panning=false

})

/* ---------------------------
Drawing
--------------------------- */

let mode="draw"
let drawing=false
let line=[]

canvas.addEventListener("mousedown",e=>{

if(space)return

drawing=true

line=[pos(e)]

})

canvas.addEventListener("mousemove",e=>{

if(!drawing)return

let p=pos(e)

line.push(p)

ctx.beginPath()

let prev=line[line.length-2]

ctx.moveTo(prev.x,prev.y)
ctx.lineTo(p.x,p.y)

ctx.lineWidth=4
ctx.strokeStyle="red"
ctx.stroke()

})

canvas.addEventListener("mouseup",e=>{

if(!drawing)return

drawing=false

if(mode==="arrow"){

let a=line[0]
let b=line[line.length-1]

save({

mode:"arrow",
x1:a.x,y1:a.y,
x2:b.x,y2:b.y

})

}else{

save({

mode:"draw",
points:line

})

}

})

function pos(e){

const rect=canvas.getBoundingClientRect()

return{

x:(e.clientX-rect.left)/scale,
y:(e.clientY-rect.top)/scale

}

}

/* ---------------------------
Icons
--------------------------- */

window.spawnPin=function(){

let icon=document.createElement("div")

icon.className="icon"
icon.innerText="📍"

icon.style.left="500px"
icon.style.top="500px"

board.appendChild(icon)

drag(icon)

}

function drag(el){

let ox,oy

el.onmousedown=e=>{

e.stopPropagation()

ox=e.offsetX
oy=e.offsetY

document.onmousemove=move
document.onmouseup=stop

}

function move(e){

let x=(e.clientX-board.getBoundingClientRect().left-panX)/scale-ox
let y=(e.clientY-board.getBoundingClientRect().top-panY)/scale-oy

el.style.left=x+"px"
el.style.top=y+"px"

}

function stop(){

document.onmousemove=null

}

el.oncontextmenu=e=>{

e.preventDefault()

el.remove()

}

}

/* ---------------------------
Save
--------------------------- */

let lines=[]

async function save(l){

lines.push(l)

await setDoc(ref,{lines})

}

/* ---------------------------
Realtime
--------------------------- */

onSnapshot(ref,s=>{

if(!s.exists())return

ctx.clearRect(0,0,canvas.width,canvas.height)

s.data().lines.forEach(l=>{

if(l.mode==="draw"){

ctx.beginPath()

l.points.forEach((p,i)=>{

if(i===0)ctx.moveTo(p.x,p.y)
else ctx.lineTo(p.x,p.y)

})

ctx.lineWidth=4
ctx.strokeStyle="red"
ctx.stroke()

}

if(l.mode==="arrow"){

ctx.beginPath()
ctx.moveTo(l.x1,l.y1)
ctx.lineTo(l.x2,l.y2)
ctx.stroke()

let angle=Math.atan2(l.y2-l.y1,l.x2-l.x1)

ctx.beginPath()

ctx.moveTo(l.x2,l.y2)
ctx.lineTo(l.x2-15*Math.cos(angle-0.5),l.y2-15*Math.sin(angle-0.5))
ctx.lineTo(l.x2-15*Math.cos(angle+0.5),l.y2-15*Math.sin(angle+0.5))

ctx.fillStyle="red"
ctx.fill()

}

})

})


/* ---------------------------
Map change
--------------------------- */

document.getElementById("mapSelect").onchange=e=>{

document.getElementById("map").src=e.target.value

}

</script>

</body>
</html>
