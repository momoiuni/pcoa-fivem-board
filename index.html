<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveM 作戦ボード</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* 左メニュー */

#left{
width:220px;
background:#1a1a1a;
padding:10px;
overflow:auto;
}

.player{
background:#2b2b2b;
padding:7px;
margin:4px 0;
border-radius:6px;
cursor:pointer;
}

/* ボード */

#board{
flex:1;
position:relative;
overflow:hidden;
touch-action:none;
cursor:grab;
}

#map{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
}

canvas{
position:absolute;
top:0;
left:0;
z-index:2;
}

.icon{
position:absolute;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
color:white;
cursor:grab;
z-index:3;
}

.pin{
position:absolute;
font-size:28px;
z-index:4;
pointer-events:none;
}

.police{background:#3498db;}
.gang{background:#e74c3c;}
.merc{background:#9b59b6;}

#top{
position:absolute;
top:10px;
left:240px;
z-index:5;
}

button{
margin:2px;
padding:6px;
}

</style>

</head>

<body>

<div id="left">

<h3>警察</h3>
<div class="player" onclick="spawn('警','police')">警察</div>

<h3>ギャング</h3>
<div class="player" onclick="spawn('七','gang')">七海のあ</div>
<div class="player" onclick="spawn('禿','gang')">蒼瀬こあ</div>
<div class="player" onclick="spawn('狼','gang')">白影潤羽</div>
<div class="player" onclick="spawn('獅','gang')">獅子蓮夢生</div>
<div class="player" onclick="spawn('犬','gang')">只野なち</div>
<div class="player" onclick="spawn('兎','gang')">兎月羅依</div>
<div class="player" onclick="spawn('嬢','gang')">雛子丸びこち</div>
<div class="player" onclick="spawn('牛','gang')">奇美羅ぬい仔</div>
<div class="player" onclick="spawn('猫','gang')">猫宮すい</div>
<div class="player" onclick="spawn('ゼ','gang')">古賀ゼン</div>
<div class="player" onclick="spawn('華','gang')">風槻華音</div>
<div class="player" onclick="spawn('雷','gang')">雷導新羅</div>

<h3>傭兵</h3>
<div class="player" onclick="spawn('澪','merc')">神楽澪</div>
<div class="player" onclick="spawn('弟','merc')">桃井そら</div>

</div>

<div id="board">

<img id="map" src="bobcat.jpg">

<canvas id="draw"></canvas>

<div id="top">

<select id="mapSelect">
<option value="bobcat.jpg">ボブキャット</option>
<option value="union.jpg">ユニオン</option>
<option value="military.jpg">軍事基地</option>
<option value="airport.jpg">飛行場</option>
<option value="humane.jpg">ヒューメイン</option>
<option value="pacific.jpg">パシフィック</option>
</select>

<br>

<button onclick="mode='line'">線</button> <button onclick="mode='arrow'">矢印</button> <button onclick="mode='pin'">ピン</button> <button onclick="undo()">戻る</button> <button onclick="clearDraw()">削除</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"
import { getFirestore,doc,setDoc,onSnapshot,getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"

/* Firebase */

const firebaseConfig={
apiKey:"AIzaSyBmvXnvy1ttB8QllcCcm6eW2ZV7Qg-ZFW4",
authDomain:"pcoa-plan.firebaseapp.com",
projectId:"pcoa-plan",
storageBucket:"pcoa-plan.firebasestorage.app",
messagingSenderId:"121585105198",
appId:"1:121585105198:web:4fe893ae9be81ba23822bf"
}

const app=initializeApp(firebaseConfig)
const db=getFirestore(app)

const params=new URLSearchParams(location.search)
const room=params.get("room") || "main"

const iconRef=doc(db,"boards",room+"_icons")
const lineRef=doc(db,"boards",room+"_lines")

/* 基本 */

const board=document.getElementById("board")
const map=document.getElementById("map")
const canvas=document.getElementById("draw")
const ctx=canvas.getContext("2d")

let mode="line"

/* view */

let view={x:0,y:0,scale:1}

/* resize */

function resize(){
canvas.width=board.clientWidth
canvas.height=board.clientHeight
}

window.addEventListener("resize",resize)
resize()

/* transform */

function applyTransform(){

const t=`translate(${view.x}px,${view.y}px) scale(${view.scale})`

map.style.transform=t
canvas.style.transform=t

}

/* zoom */

board.addEventListener("wheel",e=>{

e.preventDefault()

const rect=board.getBoundingClientRect()

const mx=e.clientX-rect.left
const my=e.clientY-rect.top

const zoom=e.deltaY<0?1.1:0.9
const newScale=Math.min(Math.max(view.scale*zoom,0.5),3)

const scaleFactor=newScale/view.scale

view.x=mx-(mx-view.x)*scaleFactor
view.y=my-(my-view.y)*scaleFactor

view.scale=newScale

applyTransform()

},{passive:false})

/* pan */

let panning=false
let startX,startY

board.addEventListener("mousedown",e=>{

if(mode==="line"||mode==="arrow") return
if(e.target.classList.contains("icon")) return

panning=true

startX=e.clientX-view.x
startY=e.clientY-view.y

})

document.addEventListener("mousemove",e=>{

if(!panning) return

view.x=e.clientX-startX
view.y=e.clientY-startY

applyTransform()

})

document.addEventListener("mouseup",()=>panning=false)

/* draw */

let drawing=false
let startX2,startY2
let preview=null

canvas.addEventListener("mousedown",e=>{

if(mode!=="line"&&mode!=="arrow") return

drawing=true

startX2=e.offsetX
startY2=e.offsetY

})

canvas.addEventListener("mousemove",e=>{

if(!drawing) return

preview={
x1:startX2,
y1:startY2,
x2:e.offsetX,
y2:e.offsetY,
mode:mode
}

render()

})

canvas.addEventListener("mouseup",e=>{

if(!drawing) return

drawing=false

saveLine({
x1:startX2,
y1:startY2,
x2:e.offsetX,
y2:e.offsetY,
mode:mode
})

preview=null

})

/* render */

let lines=[]

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height)

function draw(l,color="red"){

ctx.beginPath()
ctx.moveTo(l.x1,l.y1)
ctx.lineTo(l.x2,l.y2)
ctx.strokeStyle=color
ctx.lineWidth=4
ctx.stroke()

if(l.mode==="arrow"){

let angle=Math.atan2(l.y2-l.y1,l.x2-l.x1)

ctx.beginPath()
ctx.moveTo(l.x2,l.y2)
ctx.lineTo(l.x2-15*Math.cos(angle-0.5),l.y2-15*Math.sin(angle-0.5))
ctx.lineTo(l.x2-15*Math.cos(angle+0.5),l.y2-15*Math.sin(angle+0.5))
ctx.fillStyle=color
ctx.fill()

}

}

lines.forEach(l=>draw(l))

if(preview) draw(preview,"orange")

}

/* firebase lines */

async function saveLine(line){

let data={lines:[]}

const snap=await getDoc(lineRef)
if(snap.exists()) data=snap.data()

data.lines.push(line)

setDoc(lineRef,data)

}

onSnapshot(lineRef,snap=>{

if(!snap.exists()) return

lines=snap.data().lines

render()

})

/* icons */

window.spawn=function(char,type){

let icon=document.createElement("div")

icon.className="icon "+type
icon.innerText=char

icon.style.left="200px"
icon.style.top="200px"

board.appendChild(icon)

drag(icon)

saveIcons()

}

function drag(icon){

let offsetX,offsetY

icon.onmousedown=e=>{

offsetX=e.clientX-icon.offsetLeft
offsetY=e.clientY-icon.offsetTop

document.onmousemove=ev=>{

icon.style.left=ev.clientX-offsetX+"px"
icon.style.top=ev.clientY-offsetY+"px"

}

document.onmouseup=()=>{

document.onmousemove=null
saveIcons()

}

}

}

/* icon save */

async function saveIcons(){

let icons=[]

document.querySelectorAll(".icon").forEach(i=>{

icons.push({
text:i.innerText,
class:i.className,
x:i.style.left,
y:i.style.top
})

})

setDoc(iconRef,{icons})

}

onSnapshot(iconRef,snap=>{

if(!snap.exists()) return

document.querySelectorAll(".icon").forEach(i=>i.remove())

snap.data().icons.forEach(d=>{

let icon=document.createElement("div")

icon.className=d.class
icon.innerText=d.text

icon.style.left=d.x
icon.style.top=d.y

board.appendChild(icon)

drag(icon)

})

})

/* pins */

let pins=[]

board.addEventListener("dblclick",e=>{

if(mode!=="pin") return

const rect=board.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const p=document.createElement("div")
p.className="pin"
p.innerText="📍"

p.style.left=x+"px"
p.style.top=y+"px"

board.appendChild(p)

})

/* clear */

window.clearDraw=async()=>{
await setDoc(lineRef,{lines:[]})
}

/* undo */

window.undo=async()=>{

const snap=await getDoc(lineRef)

if(!snap.exists()) return

let data=snap.data()

data.lines.pop()

await setDoc(lineRef,data)

}

/* map change */

document.getElementById("mapSelect").addEventListener("change",e=>{
map.src=e.target.value
})

</script>

</body>
</html>
